# ==============================================================================
# Luma Shield - Premium Node Scraper Workflow
# ==============================================================================
# Runs the Luma Shield Python scraper every 5 hours or manually. It generates the
# cloud-validated premium VPN node matrix, validates the JSON artifact, stages new
# or updated output explicitly, and pushes changes with the GitHub Actions token.
# The workflow uses concurrency control, Node 24 opt-in, minimal write permission,
# and a timeout to keep CI execution efficient and reliable.
# ==============================================================================

name: Luma Premium Node Scraper

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: luma-premium-node-scraper
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape-and-update:
    name: Scrape and Update Premium Nodes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run scraper
        run: python main.py

      - name: Inspect generated output
        run: |
          pwd
          ls -lah
          test -f luma_premium_nodes.json
          wc -c luma_premium_nodes.json
          head -n 30 luma_premium_nodes.json

      - name: Validate JSON
        run: |
          python -m json.tool luma_premium_nodes.json > /tmp/luma_premium_nodes.validated.json
          mv /tmp/luma_premium_nodes.validated.json luma_premium_nodes.json

      - name: Commit and push updated nodes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f luma_premium_nodes.json
          git status --short
          if git diff --cached --quiet; then
            echo "No node changes detected."
            exit 0
          fi
          git commit -m "Auto-update premium VPN nodes"
          git push origin HEAD:${{ github.ref_name }}
