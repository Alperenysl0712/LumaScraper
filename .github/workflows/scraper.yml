# ==============================================================================
# Luma Shield - Premium Node Scraper Workflow
# ==============================================================================
# Runs the Luma Shield Python scraper every 5 hours or manually. It generates the
# cloud-validated premium VPN node matrix, validates the JSON artifact, stages new
# or updated output explicitly, and pushes changes with the GitHub Actions token.
# ==============================================================================

name: Luma Premium Node Scraper

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

concurrency:
  group: luma-premium-node-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-update:
    name: Scrape and Update Premium Nodes
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run scraper
        timeout-minutes: 38
        run: |
          echo "Scraper started at: $(date -u)"
          python main.py
          echo "Scraper finished at: $(date -u)"

      - name: Inspect generated output
        run: |
          pwd
          ls -lah
          test -f luma_premium_nodes.json
          wc -c luma_premium_nodes.json
          head -n 30 luma_premium_nodes.json

      - name: Validate and normalize JSON
        run: |
          python -m json.tool luma_premium_nodes.json > /tmp/luma_premium_nodes.validated.json
          mv /tmp/luma_premium_nodes.validated.json luma_premium_nodes.json

      - name: Verify JSON is publishable
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("luma_premium_nodes.json")

          if not path.exists():
              raise SystemExit("luma_premium_nodes.json was not generated.")

          raw = path.read_text(encoding="utf-8").strip()

          if not raw:
              raise SystemExit("luma_premium_nodes.json is empty. Refusing to publish.")

          data = json.loads(raw)

          preferred_keys = {
              "nodes",
              "premium_nodes",
              "vpn_nodes",
              "servers",
              "items",
              "data",
              "results",
              "countries",
              "countryPools",
              "pools",
          }

          def looks_like_node(item):
              if not isinstance(item, dict):
                  return False

              keys = {str(k).lower() for k in item.keys()}

              return bool(
                  {"config", "link", "url", "share", "server", "host", "ip"} & keys
              )

          def count_nodes(value, depth=0):
              if depth > 8:
                  return 0

              if isinstance(value, list):
                  if not value:
                      return 0

                  direct_nodes = sum(1 for item in value if looks_like_node(item))

                  if direct_nodes > 0:
                      return direct_nodes

                  return sum(count_nodes(item, depth + 1) for item in value)

              if isinstance(value, dict):
                  total = 0

                  for key in preferred_keys:
                      if key in value:
                          total += count_nodes(value[key], depth + 1)

                  if total > 0:
                      return total

                  return sum(count_nodes(item, depth + 1) for item in value.values())

              return 0

          count = count_nodes(data)
          size = path.stat().st_size

          print(f"Detected node count: {count}")
          print(f"JSON size bytes: {size}")

          if isinstance(data, dict):
              print(f"Top-level keys: {list(data.keys())[:40]}")

          if size < 2048:
              raise SystemExit("Node JSON is too small by file size. Refusing to publish.")

          if count < 20:
              raise SystemExit("Node JSON looks too small. Refusing to publish.")
          PY

      - name: Commit and push updated nodes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -f luma_premium_nodes.json
          git status --short

          if git diff --cached --quiet; then
            echo "No node changes detected."
            exit 0
          fi

          git commit -m "Auto-update premium VPN nodes"

          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:${{ github.ref_name }}
