# ==============================================================================
# Luma Shield - Premium Node Scraper Workflow
# ==============================================================================
# Runs the Luma Shield Python scraper on a fixed schedule and on manual demand.
# The workflow fetches fresh proxy sources, validates high-quality VPN nodes,
# regenerates luma_premium_nodes.json, and commits the file only when its content
# has actually changed. It uses dependency caching, concurrency control, minimal
# permissions, and execution time limits to keep GitHub Actions usage efficient.
# ==============================================================================

name: Luma Premium Node Scraper

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: luma-premium-node-scraper
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape-and-update:
    name: Scrape and Update Premium Nodes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run scraper
        run: python main.py

      - name: Validate output
        run: |
          python -m json.tool luma_premium_nodes.json > /tmp/luma_premium_nodes.validated.json
          mv /tmp/luma_premium_nodes.validated.json luma_premium_nodes.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- luma_premium_nodes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated nodes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add luma_premium_nodes.json
          git commit -m "Auto-update premium VPN nodes"
          git push
